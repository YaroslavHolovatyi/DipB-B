<svg viewBox="0 0 1000 1600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title-text { font-size: 24px; font-weight: bold; text-anchor: middle; }
      .subtitle-text { font-size: 18px; text-anchor: middle; }
      .step-number { font-size: 16px; font-weight: bold; fill: white; }
      .step-title { font-size: 16px; font-weight: bold; }
      .step-subtitle { font-size: 14px; fill: #666; }
      .substep-text { font-size: 12px; }
      .arrow { stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); }
      .step-box { fill: #e8f4f8; stroke: #0066cc; stroke-width: 2; }
      .step-circle { fill: #0066cc; stroke: #004a99; stroke-width: 2; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="1600" fill="#f9f9f9"/>

  <!-- Title Box -->
  <rect x="50" y="20" width="900" height="80" fill="#003d7a" stroke="#001a4d" stroke-width="2" rx="5"/>
  <text x="500" y="55" class="title-text" fill="white">ПОСЛІДОВНІСТЬ ОБРОБКИ ЧЕКА</text>
  <text x="500" y="85" class="subtitle-text" fill="#b3d9ff">Receipt Processing Sequence</text>

  <!-- ========== STEP 1: REQUEST INTAKE ========== -->
  <g id="step1">
    <!-- Circle with number -->
    <circle cx="100" cy="150" r="25" class="step-circle"/>
    <text x="100" y="160" class="step-number">1</text>

    <!-- Main box -->
    <rect x="150" y="130" width="750" height="90" class="step-box" rx="5"/>
    <text x="170" y="155" class="step-title">ПРИЙНЯТТЯ ЗАПИТУ / REQUEST INTAKE</text>
    <text x="190" y="180" class="substep-text">✓ Валідація параметрів (image_path, user_id) / Validate request parameters</text>
    <text x="190" y="200" class="substep-text">✓ Перевірити наявність файлу / Verify file exists</text>

    <!-- Arrow down -->
    <line x1="500" y1="220" x2="500" y2="250" class="arrow"/>
  </g>

  <!-- ========== STEP 2: IMAGE LOADING ========== -->
  <g id="step2">
    <circle cx="100" cy="290" r="25" class="step-circle"/>
    <text x="100" y="300" class="step-number">2</text>

    <rect x="150" y="270" width="750" height="110" class="step-box" rx="5"/>
    <text x="170" y="295" class="step-title">ЗАВАНТАЖЕННЯ ЗОБРАЖЕННЯ / IMAGE LOADING</text>
    <text x="190" y="320" class="substep-text">✓ Прочитати файл / Read file from disk</text>
    <text x="190" y="340" class="substep-text">✓ Перевірити формат / Verify format (JPEG, PNG, GIF, WebP)</text>
    <text x="190" y="360" class="substep-text">✓ Кодування в base64 / Encode to base64 for API transmission</text>

    <!-- Arrow down -->
    <line x1="500" y1="380" x2="500" y2="410" class="arrow"/>
  </g>

  <!-- ========== STEP 3: OCR CALL ========== -->
  <g id="step3">
    <circle cx="100" cy="450" r="25" class="step-circle"/>
    <text x="100" y="460" class="step-number">3</text>

    <rect x="150" y="430" width="750" height="110" class="step-box" rx="5"/>
    <text x="170" y="455" class="step-title">ВИКЛИК OCR (OpenAI Vision) / OCR CALL</text>
    <text x="190" y="480" class="substep-text">✓ Надіслати зображення до OpenAI / Send to OpenAI Vision API</text>
    <text x="190" y="500" class="substep-text">✓ Промпт: "Extract receipt data..." / Structured extraction prompt</text>
    <text x="190" y="520" class="substep-text">✓ Отримати JSON відповідь / Receive JSON response from API</text>

    <!-- Arrow down -->
    <line x1="500" y1="540" x2="500" y2="570" class="arrow"/>
  </g>

  <!-- ========== STEP 4: PARSING ========== -->
  <g id="step4">
    <circle cx="100" cy="610" r="25" class="step-circle"/>
    <text x="100" y="620" class="step-number">4</text>

    <rect x="150" y="590" width="750" height="110" class="step-box" rx="5"/>
    <text x="170" y="615" class="step-title">ПАРСИНГ РЕЗУЛЬТАТУ / RESULT PARSING</text>
    <text x="190" y="640" class="substep-text">✓ Розпарсити JSON / Parse JSON response from OCR</text>
    <text x="190" y="660" class="substep-text">✓ Перевірити обов'язкові поля / Validate required fields present</text>
    <text x="190" y="680" class="substep-text">✓ Перетворити типи даних / Convert data types (dates, decimals, enums)</text>

    <!-- Arrow down -->
    <line x1="500" y1="700" x2="500" y2="730" class="arrow"/>
  </g>

  <!-- ========== STEP 5: VALIDATION ========== -->
  <g id="step5">
    <circle cx="100" cy="790" r="25" class="step-circle"/>
    <text x="100" y="800" class="step-number">5</text>

    <rect x="150" y="770" width="750" height="130" class="step-box" rx="5"/>
    <text x="170" y="795" class="step-title">ВАЛІДАЦІЯ / VALIDATION</text>
    <text x="190" y="820" class="substep-text">✓ Pydantic валідація моделі / Validate against ReceiptOCRResult schema</text>
    <text x="190" y="840" class="substep-text">✓ Перевірити суми / Verify totals (items_sum = subtotal)</text>
    <text x="190" y="860" class="substep-text">✓ Перевірити дати / Validate dates in ISO 8601 format</text>
    <text x="190" y="880" class="substep-text">✓ Обробка помилок / Handle validation errors gracefully</text>

    <!-- Arrow down -->
    <line x1="500" y1="900" x2="500" y2="930" class="arrow"/>
  </g>

  <!-- ========== STEP 6: STORAGE ========== -->
  <g id="step6">
    <circle cx="100" cy="990" r="25" class="step-circle"/>
    <text x="100" y="1000" class="step-number">6</text>

    <rect x="150" y="970" width="750" height="110" class="step-box" rx="5"/>
    <text x="170" y="995" class="step-title">ЗБЕРЕЖЕННЯ / STORAGE</text>
    <text x="190" y="1020" class="substep-text">✓ Зберегти в БД / Save to PostgreSQL database</text>
    <text x="190" y="1040" class="substep-text">✓ Зберегти оригінальне зображення / Save original image to storage</text>
    <text x="190" y="1060" class="substep-text">✓ Логувати результати / Log processing results and metrics</text>

    <!-- Arrow down -->
    <line x1="500" y1="1080" x2="500" y2="1110" class="arrow"/>
  </g>

  <!-- ========== STEP 7: RETURN RESULT ========== -->
  <g id="step7">
    <circle cx="100" cy="1170" r="25" class="step-circle"/>
    <text x="100" y="1180" class="step-number">7</text>

    <rect x="150" y="1150" width="750" height="110" class="step-box" rx="5"/>
    <text x="170" y="1175" class="step-title">ПОВЕРНЕННЯ РЕЗУЛЬТАТУ / RETURN RESULT</text>
    <text x="190" y="1200" class="substep-text">✓ Повернути ReceiptProcessingResponse / Return API response</text>
    <text x="190" y="1220" class="substep-text">✓ Включити час обробки / Include processing time metrics</text>
    <text x="190" y="1240" class="substep-text">✓ Статус успіху / Return success status and extracted data</text>
  </g>

  <!-- ========== SUCCESS/ERROR PATHS ========== -->
  <g id="legend">
    <!-- Success path -->
    <rect x="100" y="1320" width="35" height="35" fill="#4CAF50" stroke="#2E7D32" stroke-width="2" rx="3"/>
    <text x="150" y="1345" class="step-title" fill="#333">Success Path / Успішна обробка</text>

    <!-- Error path -->
    <rect x="550" y="1320" width="35" height="35" fill="#f44336" stroke="#c62828" stroke-width="2" rx="3"/>
    <text x="600" y="1345" class="step-title" fill="#333">Error Handling / Обробка помилок</text>
  </g>

  <!-- ========== ERROR HANDLING FLOWS ========== -->
  <g id="errors" opacity="0.8">
    <!-- Error from Step 1 -->
    <line x1="100" y1="175" x2="50" y2="175" class="arrow" stroke="#f44336" stroke-dasharray="5,5"/>
    <text x="15" y="180" class="substep-text" fill="#f44336" font-weight="bold">Файл не знайден</text>

    <!-- Error from Step 3 -->
    <line x1="900" y1="485" x2="950" y2="485" class="arrow" stroke="#f44336" stroke-dasharray="5,5"/>
    <text x="785" y="505" class="substep-text" fill="#f44336" font-weight="bold">API Error</text>

    <!-- Error from Step 5 -->
    <line x1="100" y1="835" x2="50" y2="835" class="arrow" stroke="#f44336" stroke-dasharray="5,5"/>
    <text x="10" y="855" class="substep-text" fill="#f44336" font-weight="bold">Invalid Data</text>
  </g>

  <!-- ========== TIMING INFO ========== -->
  <g id="timing">
    <rect x="100" y="1420" width="800" height="140" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="120" y="1445" class="step-title" fill="#ff6f00">⏱️ Típical Processing Time / Типовий час обробки:</text>
    <text x="140" y="1470" class="substep-text" fill="#333">• Image Loading: 10-50ms</text>
    <text x="140" y="1490" class="substep-text" fill="#333">• OpenAI OCR Call: 1,000-3,000ms (network dependent)</text>
    <text x="140" y="1510" class="substep-text" fill="#333">• Parsing & Validation: 50-200ms</text>
    <text x="140" y="1530" class="substep-text" fill="#333">• Database Save: 100-500ms</text>
    <text x="540" y="1470" class="substep-text" fill="#333" font-weight="bold">Total: 1,200-4,000ms</text>
  </g>
</svg>
