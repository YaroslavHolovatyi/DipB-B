<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Рис. 2.1 — Ключові актори системи Beers&Beverages</title>
<style>
  html, body { margin: 0; padding: 0; background: #ffffff; font-family: "Inter", "Segoe UI", "Helvetica Neue", Arial, sans-serif; color: #1f2937; }
  .wrap { width: 1000px; margin: 24px auto; padding: 24px; }
  h1 { font-size: 18px; font-weight: 600; text-align: center; margin: 0 0 24px; color: #111827; }
  svg { display: block; margin: 0 auto; background: #fafafa; border: 1px solid #e5e7eb; border-radius: 8px; }
  .caption { text-align: center; margin-top: 12px; font-size: 14px; font-style: italic; color: #4b5563; }
  text { font-family: inherit; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Рис. 2.1 — Ключові актори системи Beers&amp;Beverages</h1>
  <svg viewBox="0 0 1000 560" width="1000" height="560" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
        <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
      </marker>
    </defs>

    <!-- central system box -->
    <rect x="380" y="200" width="240" height="160" rx="12" ry="12" fill="#1e3a5f" stroke="#0f172a" stroke-width="2"/>
    <text x="500" y="270" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="700">Beers&amp;Beverages</text>
    <text x="500" y="298" text-anchor="middle" fill="#cbd5e1" font-size="14">Мобільний застосунок</text>
    <text x="500" y="318" text-anchor="middle" fill="#cbd5e1" font-size="14">+ серверна частина</text>

    <!-- helper: actor -->
    <!-- Top-left: Гість -->
    <g transform="translate(140,120)">
      <circle cx="0" cy="-30" r="14" fill="none" stroke="#1f2937" stroke-width="2"/>
      <line x1="0" y1="-16" x2="0" y2="20" stroke="#1f2937" stroke-width="2"/>
      <line x1="-18" y1="0" x2="18" y2="0" stroke="#1f2937" stroke-width="2"/>
      <line x1="0" y1="20" x2="-15" y2="50" stroke="#1f2937" stroke-width="2"/>
      <line x1="0" y1="20" x2="15" y2="50" stroke="#1f2937" stroke-width="2"/>
      <text x="0" y="78" text-anchor="middle" font-size="15" font-weight="600">Гість</text>
      <text x="0" y="96" text-anchor="middle" font-size="12" fill="#6b7280">(неавторизований)</text>
    </g>
    <line x1="180" y1="170" x2="380" y2="240" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- Top-right: Відвідувач -->
    <g transform="translate(860,120)">
      <circle cx="0" cy="-30" r="14" fill="none" stroke="#1f2937" stroke-width="2"/>
      <line x1="0" y1="-16" x2="0" y2="20" stroke="#1f2937" stroke-width="2"/>
      <line x1="-18" y1="0" x2="18" y2="0" stroke="#1f2937" stroke-width="2"/>
      <line x1="0" y1="20" x2="-15" y2="50" stroke="#1f2937" stroke-width="2"/>
      <line x1="0" y1="20" x2="15" y2="50" stroke="#1f2937" stroke-width="2"/>
      <text x="0" y="78" text-anchor="middle" font-size="15" font-weight="600">Відвідувач</text>
      <text x="0" y="96" text-anchor="middle" font-size="12" fill="#6b7280">(авторизований)</text>
    </g>
    <line x1="820" y1="170" x2="620" y2="240" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- Bottom-left: Адміністратор закладу -->
    <g transform="translate(140,440)">
      <circle cx="0" cy="-30" r="14" fill="none" stroke="#1f2937" stroke-width="2"/>
      <line x1="0" y1="-16" x2="0" y2="20" stroke="#1f2937" stroke-width="2"/>
      <line x1="-18" y1="0" x2="18" y2="0" stroke="#1f2937" stroke-width="2"/>
      <line x1="0" y1="20" x2="-15" y2="50" stroke="#1f2937" stroke-width="2"/>
      <line x1="0" y1="20" x2="15" y2="50" stroke="#1f2937" stroke-width="2"/>
      <text x="0" y="78" text-anchor="middle" font-size="15" font-weight="600">Адміністратор</text>
      <text x="0" y="96" text-anchor="middle" font-size="12" fill="#6b7280">закладу</text>
    </g>
    <line x1="180" y1="440" x2="380" y2="320" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- Bottom-right: Системний адміністратор -->
    <g transform="translate(860,440)">
      <circle cx="0" cy="-30" r="14" fill="none" stroke="#1f2937" stroke-width="2"/>
      <line x1="0" y1="-16" x2="0" y2="20" stroke="#1f2937" stroke-width="2"/>
      <line x1="-18" y1="0" x2="18" y2="0" stroke="#1f2937" stroke-width="2"/>
      <line x1="0" y1="20" x2="-15" y2="50" stroke="#1f2937" stroke-width="2"/>
      <line x1="0" y1="20" x2="15" y2="50" stroke="#1f2937" stroke-width="2"/>
      <text x="0" y="78" text-anchor="middle" font-size="15" font-weight="600">Системний</text>
      <text x="0" y="96" text-anchor="middle" font-size="12" fill="#6b7280">адміністратор</text>
    </g>
    <line x1="820" y1="440" x2="620" y2="320" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  </svg>
  <div class="caption">Стрілки показують напрям взаємодії: актор → система</div>
</div>
</body>
</html>
