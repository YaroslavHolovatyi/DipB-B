<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Рис. 2.5 — Дерево компонентів мобільного клієнта</title>
<style>
  html, body { margin: 0; padding: 0; background: #ffffff; font-family: "Inter", "Segoe UI", "Helvetica Neue", Arial, sans-serif; color: #1f2937; }
  .wrap { width: 1500px; margin: 24px auto; padding: 24px; }
  h1 { font-size: 18px; font-weight: 600; text-align: center; margin: 0 0 24px; color: #111827; }
  svg { display: block; margin: 0 auto; background: #fafafa; border: 1px solid #e5e7eb; border-radius: 8px; }
  .caption { text-align: center; margin-top: 12px; font-size: 14px; font-style: italic; color: #4b5563; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Рис. 2.5 — Дерево компонентів мобільного клієнта Beers&amp;Beverages</h1>
  <svg viewBox="0 0 1500 900" width="1500" height="900" xmlns="http://www.w3.org/2000/svg">

    <!-- ===== Connector lines (drawn first so boxes overlay them) ===== -->
    <g stroke="#475569" stroke-width="1.5" fill="none">
      <!-- App → Providers / RootNavigator -->
      <path d="M 750 90 L 400 150"/>
      <path d="M 750 90 L 1100 150"/>

      <!-- Providers → 3 children -->
      <path d="M 400 210 L 230 280"/>
      <path d="M 400 210 L 450 280"/>
      <path d="M 400 210 L 670 280"/>

      <!-- RootNavigator → (auth), (tabs) -->
      <path d="M 1100 210 L 970 280"/>
      <path d="M 1100 210 L 1300 280"/>

      <!-- (auth) → Login / Register -->
      <path d="M 970 340 L 880 410"/>
      <path d="M 970 340 L 1060 410"/>

      <!-- (tabs) → 4 screens (vertical stack on right) -->
      <path d="M 1300 340 L 1170 420"/>
      <path d="M 1300 340 L 1170 510"/>
      <path d="M 1300 340 L 1170 600"/>
      <path d="M 1300 340 L 1170 690"/>

      <!-- Each screen → components bundle -->
      <line x1="1230" y1="430" x2="1290" y2="430"/>
      <line x1="1230" y1="520" x2="1290" y2="520"/>
      <line x1="1230" y1="610" x2="1290" y2="610"/>
      <line x1="1230" y1="700" x2="1290" y2="700"/>
    </g>

    <!-- ===== Level 0: App (root) ===== -->
    <g>
      <rect x="650" y="30" width="200" height="60" rx="10" fill="#0f172a" stroke="#000000" stroke-width="1.5"/>
      <text x="750" y="58" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">&lt;App /&gt;</text>
      <text x="750" y="78" text-anchor="middle" fill="#94a3b8" font-size="11">app/_layout.tsx</text>
    </g>

    <!-- ===== Level 1: Providers ===== -->
    <g>
      <rect x="300" y="150" width="200" height="60" rx="10" fill="#1e3a5f" stroke="#0f172a" stroke-width="1.5"/>
      <text x="400" y="178" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">&lt;Providers /&gt;</text>
      <text x="400" y="198" text-anchor="middle" fill="#cbd5e1" font-size="11">контекстні обгортки</text>
    </g>

    <!-- ===== Level 1: RootNavigator ===== -->
    <g>
      <rect x="1000" y="150" width="200" height="60" rx="10" fill="#1e3a5f" stroke="#0f172a" stroke-width="1.5"/>
      <text x="1100" y="178" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">&lt;RootNavigator /&gt;</text>
      <text x="1100" y="198" text-anchor="middle" fill="#cbd5e1" font-size="11">expo-router · Stack</text>
    </g>

    <!-- ===== Level 2: Providers children ===== -->
    <g>
      <rect x="130" y="280" width="200" height="52" rx="8" fill="#0f766e" stroke="#064e3b" stroke-width="1.5"/>
      <text x="230" y="304" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">QueryClientProvider</text>
      <text x="230" y="322" text-anchor="middle" fill="#d1fae5" font-size="11">TanStack Query</text>

      <rect x="350" y="280" width="200" height="52" rx="8" fill="#0f766e" stroke="#064e3b" stroke-width="1.5"/>
      <text x="450" y="304" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">AuthProvider</text>
      <text x="450" y="322" text-anchor="middle" fill="#d1fae5" font-size="11">Zustand store + JWT</text>

      <rect x="570" y="280" width="200" height="52" rx="8" fill="#0f766e" stroke="#064e3b" stroke-width="1.5"/>
      <text x="670" y="304" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">ThemeProvider</text>
      <text x="670" y="322" text-anchor="middle" fill="#d1fae5" font-size="11">NativeWind · dark/light</text>
    </g>

    <!-- ===== Level 2: Navigation groups ===== -->
    <g>
      <rect x="870" y="280" width="200" height="60" rx="8" fill="#7c2d12" stroke="#431407" stroke-width="1.5"/>
      <text x="970" y="306" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">(auth) Stack</text>
      <text x="970" y="326" text-anchor="middle" fill="#fed7aa" font-size="11">для неавторизованих</text>

      <rect x="1200" y="280" width="200" height="60" rx="8" fill="#7c2d12" stroke="#431407" stroke-width="1.5"/>
      <text x="1300" y="306" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">(tabs) TabNavigator</text>
      <text x="1300" y="326" text-anchor="middle" fill="#fed7aa" font-size="11">4 нижні вкладки</text>
    </g>

    <!-- ===== Level 3: Auth screens ===== -->
    <g>
      <rect x="810" y="410" width="140" height="50" rx="8" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
      <text x="880" y="432" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="700">LoginScreen</text>
      <text x="880" y="450" text-anchor="middle" fill="#7c2d12" font-size="10">(auth)/login.tsx</text>

      <rect x="990" y="410" width="140" height="50" rx="8" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
      <text x="1060" y="432" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="700">RegisterScreen</text>
      <text x="1060" y="450" text-anchor="middle" fill="#7c2d12" font-size="10">(auth)/register.tsx</text>
    </g>

    <!-- ===== Level 3: Tab screens (vertical stack) ===== -->
    <!-- Map -->
    <g>
      <rect x="1100" y="405" width="130" height="50" rx="8" fill="#5b21b6" stroke="#2e1065" stroke-width="1.5"/>
      <text x="1165" y="427" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">MapScreen</text>
      <text x="1165" y="445" text-anchor="middle" fill="#ddd6fe" font-size="10">(tabs)/map.tsx</text>

      <rect x="1290" y="400" width="200" height="60" rx="6" fill="#ffffff" stroke="#475569" stroke-width="1"/>
      <text x="1390" y="420" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">діти екрана</text>
      <text x="1390" y="438" text-anchor="middle" font-size="10" fill="#334155">MapView · VenueMarker</text>
      <text x="1390" y="452" text-anchor="middle" font-size="10" fill="#334155">FilterBar · BottomSheet</text>
    </g>

    <!-- Scan -->
    <g>
      <rect x="1100" y="495" width="130" height="50" rx="8" fill="#5b21b6" stroke="#2e1065" stroke-width="1.5"/>
      <text x="1165" y="517" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">ScanScreen</text>
      <text x="1165" y="535" text-anchor="middle" fill="#ddd6fe" font-size="10">(tabs)/scan.tsx</text>

      <rect x="1290" y="490" width="200" height="60" rx="6" fill="#ffffff" stroke="#475569" stroke-width="1"/>
      <text x="1390" y="510" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">діти екрана</text>
      <text x="1390" y="528" text-anchor="middle" font-size="10" fill="#334155">CameraView · ReceiptPreview</text>
      <text x="1390" y="542" text-anchor="middle" font-size="10" fill="#334155">ItemList · ProgressIndicator</text>
    </g>

    <!-- Tales -->
    <g>
      <rect x="1100" y="585" width="130" height="50" rx="8" fill="#5b21b6" stroke="#2e1065" stroke-width="1.5"/>
      <text x="1165" y="607" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">TalesScreen</text>
      <text x="1165" y="625" text-anchor="middle" fill="#ddd6fe" font-size="10">(tabs)/tales.tsx</text>

      <rect x="1290" y="580" width="200" height="60" rx="6" fill="#ffffff" stroke="#475569" stroke-width="1"/>
      <text x="1390" y="600" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">діти екрана</text>
      <text x="1390" y="618" text-anchor="middle" font-size="10" fill="#334155">TalesFeed · TaleCard</text>
      <text x="1390" y="632" text-anchor="middle" font-size="10" fill="#334155">ShareButton · LikeButton</text>
    </g>

    <!-- Profile -->
    <g>
      <rect x="1100" y="675" width="130" height="50" rx="8" fill="#5b21b6" stroke="#2e1065" stroke-width="1.5"/>
      <text x="1165" y="697" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">ProfileScreen</text>
      <text x="1165" y="715" text-anchor="middle" fill="#ddd6fe" font-size="10">(tabs)/profile.tsx</text>

      <rect x="1290" y="670" width="200" height="60" rx="6" fill="#ffffff" stroke="#475569" stroke-width="1"/>
      <text x="1390" y="690" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">діти екрана</text>
      <text x="1390" y="708" text-anchor="middle" font-size="10" fill="#334155">StatsBlock · FavoritesList</text>
      <text x="1390" y="722" text-anchor="middle" font-size="10" fill="#334155">SettingsForm · LogoutButton</text>
    </g>

    <!-- ===== Legend ===== -->
    <g transform="translate(40,790)">
      <rect x="0" y="0" width="1420" height="80" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
      <text x="20" y="22" font-size="13" font-weight="700" fill="#0f172a">Легенда (за рівнями ієрархії):</text>

      <rect x="20" y="36" width="22" height="14" rx="3" fill="#0f172a"/>
      <text x="52" y="48" font-size="12" fill="#334155">root</text>

      <rect x="100" y="36" width="22" height="14" rx="3" fill="#1e3a5f"/>
      <text x="132" y="48" font-size="12" fill="#334155">контейнери (Providers, Router)</text>

      <rect x="340" y="36" width="22" height="14" rx="3" fill="#0f766e"/>
      <text x="372" y="48" font-size="12" fill="#334155">провайдери стану</text>

      <rect x="530" y="36" width="22" height="14" rx="3" fill="#7c2d12"/>
      <text x="562" y="48" font-size="12" fill="#334155">навігаційні групи</text>

      <rect x="720" y="36" width="22" height="14" rx="3" fill="#fef3c7" stroke="#b45309"/>
      <text x="752" y="48" font-size="12" fill="#334155">auth-екрани</text>

      <rect x="870" y="36" width="22" height="14" rx="3" fill="#5b21b6"/>
      <text x="902" y="48" font-size="12" fill="#334155">tab-екрани</text>

      <rect x="1000" y="36" width="22" height="14" rx="3" fill="#ffffff" stroke="#475569"/>
      <text x="1032" y="48" font-size="12" fill="#334155">внутрішні UI-компоненти екрана</text>

      <text x="20" y="68" font-size="11" font-style="italic" fill="#64748b">
        Файлова маршрутизація expo-router: групи у круглих дужках (auth), (tabs) не з'являються в URL.
      </text>
    </g>
  </svg>
  <div class="caption">Ієрархія: App → Providers + RootNavigator → (auth) / (tabs) → екрани → внутрішні компоненти</div>
</div>
</body>
</html>
