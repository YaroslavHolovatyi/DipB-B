<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Рис. 2.3 — UML діаграма використання для відвідувача</title>
<style>
  html, body { margin: 0; padding: 0; background: #ffffff; font-family: "Inter", "Segoe UI", "Helvetica Neue", Arial, sans-serif; color: #1f2937; }
  .wrap { width: 1100px; margin: 24px auto; padding: 24px; }
  h1 { font-size: 18px; font-weight: 600; text-align: center; margin: 0 0 24px; color: #111827; }
  svg { display: block; margin: 0 auto; background: #fafafa; border: 1px solid #e5e7eb; border-radius: 8px; }
  .caption { text-align: center; margin-top: 12px; font-size: 14px; font-style: italic; color: #4b5563; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Рис. 2.3 — UML діаграма використання для відвідувача</h1>
  <svg viewBox="0 0 1100 760" width="1100" height="760" xmlns="http://www.w3.org/2000/svg">
    <!-- System boundary -->
    <rect x="320" y="40" width="720" height="680" rx="6" ry="6" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
    <text x="680" y="65" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2937">Beers&amp;Beverages — мобільний застосунок</text>

    <!-- Actor -->
    <g transform="translate(140,380)">
      <circle cx="0" cy="-30" r="16" fill="none" stroke="#1f2937" stroke-width="2"/>
      <line x1="0" y1="-14" x2="0" y2="24" stroke="#1f2937" stroke-width="2"/>
      <line x1="-22" y1="0" x2="22" y2="0" stroke="#1f2937" stroke-width="2"/>
      <line x1="0" y1="24" x2="-18" y2="58" stroke="#1f2937" stroke-width="2"/>
      <line x1="0" y1="24" x2="18" y2="58" stroke="#1f2937" stroke-width="2"/>
      <text x="0" y="88" text-anchor="middle" font-size="15" font-weight="600">Відвідувач</text>
    </g>

    <!-- Use cases -->
    <g font-size="13" fill="#0f172a">
      <ellipse cx="500" cy="115" rx="115" ry="32" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
      <text x="500" y="120" text-anchor="middle">Реєстрація / Вхід</text>

      <ellipse cx="780" cy="115" rx="115" ry="32" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
      <text x="780" y="120" text-anchor="middle">Геопошук закладів</text>

      <ellipse cx="500" cy="215" rx="125" ry="32" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
      <text x="500" y="220" text-anchor="middle">Перегляд картки закладу</text>

      <ellipse cx="780" cy="215" rx="115" ry="32" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
      <text x="780" y="220" text-anchor="middle">Чекін у закладі</text>

      <ellipse cx="500" cy="320" rx="125" ry="32" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
      <text x="500" y="325" text-anchor="middle">Сканування чека</text>

      <ellipse cx="780" cy="320" rx="125" ry="32" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
      <text x="780" y="325" text-anchor="middle">Підтвердити позиції</text>

      <ellipse cx="500" cy="425" rx="125" ry="32" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
      <text x="500" y="430" text-anchor="middle">Переглянути Tavern Tale</text>

      <ellipse cx="780" cy="425" rx="125" ry="32" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
      <text x="780" y="430" text-anchor="middle">Поділитися наративом</text>

      <ellipse cx="500" cy="530" rx="125" ry="32" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
      <text x="500" y="535" text-anchor="middle">Історія візитів</text>

      <ellipse cx="780" cy="530" rx="125" ry="32" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
      <text x="780" y="535" text-anchor="middle">Особиста статистика</text>

      <ellipse cx="500" cy="635" rx="115" ry="32" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
      <text x="500" y="640" text-anchor="middle">Обрані заклади</text>

      <ellipse cx="780" cy="635" rx="125" ry="32" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
      <text x="780" y="640" text-anchor="middle">Налаштування профілю</text>
    </g>

    <!-- Lines from actor to use cases -->
    <g stroke="#374151" stroke-width="1.3" fill="none">
      <line x1="180" y1="360" x2="385" y2="115"/>
      <line x1="180" y1="360" x2="665" y2="115"/>
      <line x1="180" y1="360" x2="375" y2="215"/>
      <line x1="180" y1="360" x2="665" y2="215"/>
      <line x1="180" y1="360" x2="375" y2="320"/>
      <line x1="180" y1="360" x2="655" y2="320"/>
      <line x1="180" y1="360" x2="375" y2="425"/>
      <line x1="180" y1="360" x2="655" y2="425"/>
      <line x1="180" y1="360" x2="375" y2="530"/>
      <line x1="180" y1="360" x2="655" y2="530"/>
      <line x1="180" y1="360" x2="385" y2="635"/>
      <line x1="180" y1="360" x2="655" y2="635"/>
    </g>

    <!-- include/extend -->
    <g stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="6 4" fill="none">
      <line x1="625" y1="320" x2="655" y2="320"/>
      <line x1="625" y1="425" x2="655" y2="425"/>
      <line x1="625" y1="530" x2="655" y2="530"/>
    </g>
    <g font-size="11" fill="#64748b" font-style="italic">
      <text x="640" y="313" text-anchor="middle">«include»</text>
      <text x="640" y="418" text-anchor="middle">«extend»</text>
      <text x="640" y="523" text-anchor="middle">«include»</text>
    </g>
  </svg>
  <div class="caption">Відвідувач взаємодіє з усіма базовими сценаріями: геопошук, чекін, OCR чеків, Tavern Tales та особистий кабінет</div>
</div>
</body>
</html>
