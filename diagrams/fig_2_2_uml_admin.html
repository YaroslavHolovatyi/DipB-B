<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Рис. 2.2 — UML діаграма використання для адміністратора закладу</title>
<style>
  html, body { margin: 0; padding: 0; background: #ffffff; font-family: "Inter", "Segoe UI", "Helvetica Neue", Arial, sans-serif; color: #1f2937; }
  .wrap { width: 1100px; margin: 24px auto; padding: 24px; }
  h1 { font-size: 18px; font-weight: 600; text-align: center; margin: 0 0 24px; color: #111827; }
  svg { display: block; margin: 0 auto; background: #fafafa; border: 1px solid #e5e7eb; border-radius: 8px; }
  .caption { text-align: center; margin-top: 12px; font-size: 14px; font-style: italic; color: #4b5563; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Рис. 2.2 — UML діаграма використання для адміністратора закладу</h1>
  <svg viewBox="0 0 1100 720" width="1100" height="720" xmlns="http://www.w3.org/2000/svg">
    <!-- System boundary -->
    <rect x="320" y="40" width="720" height="640" rx="6" ry="6" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
    <text x="680" y="65" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2937">Beers&amp;Beverages — кабінет закладу</text>

    <!-- Actor -->
    <g transform="translate(140,360)">
      <circle cx="0" cy="-30" r="16" fill="none" stroke="#1f2937" stroke-width="2"/>
      <line x1="0" y1="-14" x2="0" y2="24" stroke="#1f2937" stroke-width="2"/>
      <line x1="-22" y1="0" x2="22" y2="0" stroke="#1f2937" stroke-width="2"/>
      <line x1="0" y1="24" x2="-18" y2="58" stroke="#1f2937" stroke-width="2"/>
      <line x1="0" y1="24" x2="18" y2="58" stroke="#1f2937" stroke-width="2"/>
      <text x="0" y="88" text-anchor="middle" font-size="15" font-weight="600">Адміністратор</text>
      <text x="0" y="106" text-anchor="middle" font-size="13" fill="#6b7280">закладу</text>
    </g>

    <!-- Use cases (ellipses) -->
    <g font-size="13" fill="#0f172a">
      <ellipse cx="500" cy="115" rx="105" ry="32" fill="#e0e7ff" stroke="#1e3a5f" stroke-width="1.5"/>
      <text x="500" y="120" text-anchor="middle">Авторизація</text>

      <ellipse cx="780" cy="115" rx="120" ry="32" fill="#e0e7ff" stroke="#1e3a5f" stroke-width="1.5"/>
      <text x="780" y="120" text-anchor="middle">Редагувати картку</text>

      <ellipse cx="500" cy="220" rx="110" ry="32" fill="#e0e7ff" stroke="#1e3a5f" stroke-width="1.5"/>
      <text x="500" y="225" text-anchor="middle">Завантажити фото</text>

      <ellipse cx="780" cy="220" rx="125" ry="32" fill="#e0e7ff" stroke="#1e3a5f" stroke-width="1.5"/>
      <text x="780" y="225" text-anchor="middle">Управляти меню</text>

      <ellipse cx="500" cy="335" rx="120" ry="32" fill="#e0e7ff" stroke="#1e3a5f" stroke-width="1.5"/>
      <text x="500" y="340" text-anchor="middle">Переглядати аналітику</text>

      <ellipse cx="780" cy="335" rx="130" ry="32" fill="#e0e7ff" stroke="#1e3a5f" stroke-width="1.5"/>
      <text x="780" y="340" text-anchor="middle">Модерувати відгуки</text>

      <ellipse cx="500" cy="450" rx="125" ry="32" fill="#e0e7ff" stroke="#1e3a5f" stroke-width="1.5"/>
      <text x="500" y="455" text-anchor="middle">Створити спецпропозицію</text>

      <ellipse cx="780" cy="450" rx="125" ry="32" fill="#e0e7ff" stroke="#1e3a5f" stroke-width="1.5"/>
      <text x="780" y="455" text-anchor="middle">Відповідати на відгуки</text>

      <ellipse cx="500" cy="565" rx="120" ry="32" fill="#e0e7ff" stroke="#1e3a5f" stroke-width="1.5"/>
      <text x="500" y="570" text-anchor="middle">Налаштувати графік</text>

      <ellipse cx="780" cy="565" rx="130" ry="32" fill="#e0e7ff" stroke="#1e3a5f" stroke-width="1.5"/>
      <text x="780" y="570" text-anchor="middle">Експортувати звіт</text>
    </g>

    <!-- Lines from actor to use cases -->
    <g stroke="#374151" stroke-width="1.3" fill="none">
      <line x1="180" y1="340" x2="395" y2="115"/>
      <line x1="180" y1="340" x2="660" y2="115"/>
      <line x1="180" y1="340" x2="390" y2="220"/>
      <line x1="180" y1="340" x2="655" y2="220"/>
      <line x1="180" y1="340" x2="380" y2="335"/>
      <line x1="180" y1="340" x2="650" y2="335"/>
      <line x1="180" y1="340" x2="375" y2="450"/>
      <line x1="180" y1="340" x2="650" y2="450"/>
      <line x1="180" y1="340" x2="380" y2="565"/>
      <line x1="180" y1="340" x2="650" y2="565"/>
    </g>

    <!-- include / extends -->
    <g stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="6 4" fill="none">
      <line x1="605" y1="115" x2="660" y2="115"/>
      <line x1="605" y1="220" x2="655" y2="220"/>
      <line x1="620" y1="335" x2="650" y2="335"/>
    </g>
    <g font-size="11" fill="#64748b" font-style="italic">
      <text x="632" y="108" text-anchor="middle">«include»</text>
      <text x="630" y="213" text-anchor="middle">«include»</text>
      <text x="635" y="328" text-anchor="middle">«extend»</text>
    </g>
  </svg>
  <div class="caption">Адміністратор закладу взаємодіє з модулями керування карткою, контентом, аналітикою та відгуками</div>
</div>
</body>
</html>
