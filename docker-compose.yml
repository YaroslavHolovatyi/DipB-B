# Local-dev services for Beer & Beverages.
# Brings up PostgreSQL 16 (with PostGIS) and Redis 7 on the standard ports.
#
#   docker compose up -d        — start in background
#   docker compose logs -f      — watch logs
#   docker compose down         — stop (keeps data)
#   docker compose down -v      — stop and wipe volumes (fresh DB)

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: bb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: beer_and_beverages
      # PostGIS image enables the extension automatically on the default DB
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - bb_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d beer_and_beverages"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: bb_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - bb_redisdata:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  bb_pgdata:
  bb_redisdata:
