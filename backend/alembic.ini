# Alembic config — see https://alembic.sqlalchemy.org/en/latest/tutorial.html
#
# The DB URL is intentionally NOT set here. It's loaded from `app.core.config`
# inside `alembic/env.py` so the same `.env` drives both the app and migrations.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
# `version_path_separator = os` is the modern default; keep it explicit.
version_path_separator = os
# YYYYMMDD_HHMM_<slug>.py — sortable filenames make `git log` of migrations sane.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# `timezone` for the file_template timestamps (UTC keeps every dev's filenames identical).
timezone = UTC

[post_write_hooks]
# Auto-format generated migrations with ruff.
hooks = ruff_format,ruff_check
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME
ruff_check.type = console_scripts
ruff_check.entrypoint = ruff
ruff_check.options = check --fix REVISION_SCRIPT_FILENAME

# ---------- Logging ----------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
